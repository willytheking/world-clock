<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge Mondiale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏰ Horloge Mondiale</h1>
        
        <div class="clocks">
            <div class="clock-card new-york">
                <div class="city-name">🗽 New York</div>
                <div class="time" id="time-ny">--:--:--</div>
                <div class="timezone">UTC-5 (EST)</div>
            </div>
            
            <div class="clock-card paris">
                <div class="city-name">🗼 Paris</div>
                <div class="time" id="time-paris">--:--:--</div>
                <div class="timezone">UTC+1 (CET)</div>
            </div>
        </div>
        
        <div class="info">
            <p>Mise à jour en temps réel</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
